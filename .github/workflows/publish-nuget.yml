name: Publish NuGet Package

on:
  push:
    branches: [ main, rbattistoni/main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Pack
      run: dotnet pack --configuration Release --no-build --output ./artifacts

    - name: Publish to GitHub Packages
      run: dotnet nuget push "./artifacts/*.nupkg" --source "https://nuget.pkg.github.com/battistoniramiro/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

    - name: Publish to NuGet.org (only on tags)
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet nuget push "./artifacts/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
